<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricketify</title>
    <style>
        :root {
            --bg: #0b1120;
            --bg-elevated: rgba(15, 23, 42, 0.72);
            --text: #e5e7eb;
            --muted: #94a3b8;
            --accent: #22d3ee;
            --accent-2: #818cf8;
            --card-border: rgba(148, 163, 184, 0.25);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(34, 211, 238, 0.12), transparent 42%),
                radial-gradient(circle at top right, rgba(129, 140, 248, 0.13), transparent 36%),
                var(--bg);
            padding: 28px 16px 40px;
        }

        .app {
            width: min(1040px, 100%);
            margin: 0 auto;
        }

        .hero {
            background: var(--bg-elevated);
            border: 1px solid var(--card-border);
            border-radius: 18px;
            backdrop-filter: blur(10px);
            padding: 28px 24px;
            box-shadow: 0 24px 50px rgba(2, 6, 23, 0.45);
        }

        .hero h1 {
            font-size: clamp(1.6rem, 2.8vw, 2.3rem);
            margin-bottom: 8px;
            letter-spacing: 0.3px;
        }

        .hero p {
            color: var(--muted);
            max-width: 56ch;
            line-height: 1.5;
        }

        .grid {
            margin-top: 24px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
        }

        .card {
            border: 1px solid var(--card-border);
            background: rgba(15, 23, 42, 0.7);
            border-radius: 16px;
            padding: 20px;
            cursor: pointer;
            text-align: left;
            color: var(--text);
            transition: transform 0.24s ease, border-color 0.24s ease, box-shadow 0.24s ease;
        }

        .card h2 {
            font-size: 1.1rem;
            margin-bottom: 8px;
        }

        .card p {
            color: var(--muted);
            line-height: 1.4;
            font-size: 0.95rem;
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: rgba(34, 211, 238, 0.55);
            box-shadow: 0 16px 34px rgba(2, 6, 23, 0.45);
        }

        .card:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 3px;
        }

        .tag {
            display: inline-flex;
            margin-top: 14px;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 0.78rem;
            color: #dbeafe;
            background: linear-gradient(120deg, rgba(34, 211, 238, 0.2), rgba(129, 140, 248, 0.2));
            border: 1px solid rgba(129, 140, 248, 0.35);
        }
    </style>
</head>
<body>
    <main class="app">
        <section class="hero">
            <h1>Cricketify Streams</h1>
            <p>Choose your channel to watch in a clean, distraction-free player with a smooth and responsive interface.</p>
        </section>

        <section class="grid">
            <button class="card" onclick="location.href='willow.html'" aria-label="Open Willow HD stream">
                <h2>Willow HD</h2>
                <p>Crisp stream player with fast loading and full-screen support.</p>
                <span class="tag">Live</span>
            </button>

            <button class="card" onclick="location.href='Skysports.html'" aria-label="Open Sky Sports stream">
                <h2>Sky Sports</h2>
                <p>Open the Sky Sports page with the same modern and smooth experience.</p>
                <span class="tag">Live</span>
            </button>

            <button class="card" onclick="location.href='starsports.html'" aria-label="Open Star Sports stream">
                <h2>Star Sports</h2>
                <p>Watch Star Sports in a polished player view optimized for all screens.</p>
                <span class="tag">Live</span>
            </button>
        </section>
    </main>
</body>
</html>
